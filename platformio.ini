; PlatformIO Project Configuration File
; Morticia eCompass - 9DOF Heading Sensor for Signal K
;
; Hardware:
;   Board:  SH-ESP32 (Hat Labs Sailor Hat for ESP32)
;   Sensor: BRKT-STBC-AGM01 (NXP FXOS8700CQ + FXAS21002C)
;
; Wiring (BRKT -> SH-ESP32 I2C header):
;   Pin 5 (SDA1)       -> SDA (GPIO 16)
;   Pin 4 (SCL1)       -> SCL (GPIO 17)
;   Pin 1 (VDD_8700)   -> 3.3V
;   Pin 3 (VDDIO_8700) -> 3.3V
;   Pin 7 (VDD_21002)  -> 3.3V
;   Pin 9 (VDDIO_21002)-> 3.3V
;   TP 5 (GND)         -> GND
;
; Note: SH-ESP32 I2C header has 2k pull-up resistors.
;       Do NOT add external pull-ups.
;
; BRKT-STBC-AGM01 I2C Addresses:
;   FXOS8700CQ (accel/mag): 0x1E  (differs from Adafruit 3463 default 0x1F)
;   FXAS21002C (gyro):      0x20  (differs from Adafruit 3463 default 0x21)

[platformio]
default_envs = shesp32

[env]
; Options common for all environments
framework = arduino
lib_ldf_mode = deep

;; Uncomment and change these if PlatformIO can't auto-detect the ports
;monitor_port = /dev/tty.usbserial-XXXX
;upload_port = /dev/tty.usbserial-XXXX
upload_speed = 2000000
monitor_speed = 115200

lib_deps =
    ; SensESP v3.1+ for Signal K connectivity
    SignalK/SensESP @ ^3.1.0
    ; SignalK-Orientation pulls in OrientationSensorFusion-ESP transitively
    https://github.com/BjarneBitscrambler/SignalK-Orientation

build_flags =
    ; SH-ESP32 I2C pins (non-default for ESP32)
    -D PIN_I2C_SDA=16
    -D PIN_I2C_SCL=17
    ; BRKT-STBC-AGM01 I2C addresses (differ from Adafruit defaults)
    -D BOARD_ACCEL_MAG_I2C_ADDR=0x1E
    -D BOARD_GYRO_I2C_ADDR=0x20
    ; SH-ESP32 blue LED on GPIO2
    -D LED_BUILTIN=2
    ; Boot button on GPIO0 - verify no I2C conflict (see Bjarne's note)
    ; If continuous resets occur during I2C init, change to unused GPIO:
    ; -D BUTTON_BUILTIN=27
    ; Max debugging level in Arduino ESP32 Core
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    ; Arduino Core bug workaround
    -D TAG='"Morticia-eCompass"'
    ; Required by SensESP v3
    -D USE_ESP_IDF_LOG

; Partition table: OTA-capable with minimal SPIFFS
board_build.partitions = min_spiffs.csv

[env:shesp32]
; SH-ESP32 uses pioarduino platform for SensESP v3.1+ compatibility
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
build_flags =
    ${env.build_flags}
build_unflags = -Werror=reorder
monitor_filters = esp32_exception_decoder
lib_deps =
    ${env.lib_deps}
    ; pioarduino needs the ESP websocket component
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413
